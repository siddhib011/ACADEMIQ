<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACADEMIQ - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-6 space-y-8">
        <!-- Logo & Heading -->
        <div class="text-center">
            <img src="image/hat.png" alt="ACADEMIQ Logo" class="h-16 w-auto mx-auto mb-4">
            <h2 class="text-3xl font-bold text-gray-800">Create Account</h2>
            <p class="mt-2 text-gray-600">Start your JEE preparation journey</p>
        </div>

        <!-- Signup Form -->
        <form class="mt-8 space-y-6 bg-white p-8 rounded-xl shadow-sm">
            <div class="space-y-4">
                <!-- Full Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" 
                    class="w-full bg-purple-500 text-white py-3 px-4 rounded-lg hover:bg-purple-600 transition-colors font-medium">
                Create Account
            </button>

            <!-- Login Link -->
            <div class="text-center text-sm text-gray-600">
                Already have an account? 
                <a href="index.html" class="text-purple-500 hover:text-purple-700 font-medium">Log in</a>
            </div>
        </form>
    </div>
    <script>
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Simple validation
            const inputs = document.querySelectorAll('input');
            let isValid = true;
            
            inputs.forEach(input => {
                if(!input.value.trim()) {
                    input.classList.add('border-red-500');
                    isValid = false;
                } else {
                    input.classList.remove('border-red-500');
                }
            });
        
            if(isValid) {
                // Temporary success message
                alert('Account created successfully! Redirecting...');
                window.location.href = 'dashboard.html';
            }
        });
        </script>
</body>
</html>
