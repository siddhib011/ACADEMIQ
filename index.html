<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/style.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
<body class="bg-lavender min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96 transition-all duration-300 hover:shadow-xl">
        <div class="text-center mb-8">
            <img src="/image/hat.png" alt="Logo" class="h-16 mx-auto mb-4">
            <h1 class="text-3xl font-semibold text-accent">ACADEMIQ</h1>
            <p class="text-gray-600 mt-2">JEE Advanced Preparation Portal</p>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <input type="text" placeholder="Username" 
                       class="w-full p-3 border border-lavender rounded-lg focus:ring-2 focus:ring-accent focus:border-accent">
            </div>
            <div>
                <input type="password" placeholder="Password" 
                       class="w-full p-3 border border-lavender rounded-lg focus:ring-2 focus:ring-accent focus:border-accent">
            </div>
            <button type="submit" 
                    class="w-full bg-accent text-white p-3 rounded-lg hover:bg-accent/90 transition-colors font-medium">
                Login
            </button>
        </form>
        
        <p class="mt-6 text-center text-gray-600">
            New user? 
            <a href="signup.html" class="text-accent hover:text-accent/80 transition-colors">Create account</a>
        </p>
    </div>
    <script src="script.js"></script>
</body>
</html>
